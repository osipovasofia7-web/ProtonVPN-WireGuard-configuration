name: vpn_download.yml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vpn-configs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable chromium-chromedriver

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install selenium webdriver-manager

    - name: Run Downloader Script
      env:
        VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
        VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
      run: |
        from selenium import webdriver
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.common.by import By
        import time, os, requests

        options = Options()
        options.add_argument('--headless')
        options.add_argument('--no-sandbox')
        options.add_argument('--disable-dev-shm-usage')
        driver = webdriver.Chrome(options=options)

        driver.get('https://account.protonvpn.com/login')
        time.sleep(3)
        driver.find_element(By.ID, 'username').send_keys(os.environ['VPN_USERNAME'])
        driver.find_element(By.ID, 'password').send_keys(os.environ['VPN_PASSWORD'])
        driver.find_element(By.CSS_SELECTOR, 'button[type="submit"]').click()
        time.sleep(5)
        driver.get('https://account.protonvpn.com/downloads#wireguard-configuration')
        time.sleep(3)
        url = driver.find_element(By.CSS_SELECTOR, 'a[href*="wireguard"]').get_attribute('href')
        r = requests.get(url)
        open('ProtonVPN_WireGuard_Configs.zip', 'wb').write(r.content)
        driver.quit()

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProtonVPN_WireGuard_Configs
        path: ProtonVPN_WireGuard_Configs.zip
